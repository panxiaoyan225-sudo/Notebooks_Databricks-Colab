name: Daily Staffing Data Sync

on:
  schedule:
    # This runs at 00:00 UTC every day (7:00 PM or 8:00 PM EST)
    - cron: '30 21 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run databricks_python
        # Replace 'staffing_script.py' with your actual python file name
        run: python databricks_python.py